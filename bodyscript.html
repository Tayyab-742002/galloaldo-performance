<!-- Preloader safety-net: if JS hasn't removed the preloader within 1200ms
     (e.g. large JS bundle still downloading on slow mobile), remove it via
     CSS class so the hero content becomes visible. GSAP will call
     clearTimeout(window.__plTimer) in startReveal() on fast connections,
     so the normal animated transition plays there instead. -->
<script>(function(){var t=setTimeout(function(){var b=document.body,h=document.documentElement;if(b&&b.classList.contains('preloader-visible')){b.classList.remove('preloader-visible');h.classList.remove('html-overflow-hidden');}},1200);window.__plTimer=t;}());</script>
